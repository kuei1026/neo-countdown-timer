<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neo Countdown Timer</title>
  <style>
    :root {
      --bg-1: #07111f;
      --bg-2: #0b1b2f;
      --panel: rgba(14, 27, 46, 0.72);
      --panel-border: rgba(152, 198, 255, 0.18);
      --text: #eef6ff;
      --muted: #9eb2cb;
      --accent: #62c4ff;
      --accent-2: #7f7bff;
      --success: #7effc7;
      --danger: #ff6f91;
      --shadow: 0 20px 80px rgba(0, 0, 0, 0.35);
      --ring-track: rgba(255,255,255,0.08);
      --ring-glow: drop-shadow(0 0 10px rgba(98,196,255,0.55)) drop-shadow(0 0 22px rgba(127,123,255,0.25));
    }

    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
      font-family: Inter, "Noto Sans TC", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(98,196,255,0.16), transparent 28%),
        radial-gradient(circle at 80% 30%, rgba(127,123,255,0.18), transparent 30%),
        radial-gradient(circle at 50% 100%, rgba(0,255,194,0.10), transparent 26%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      overflow: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      width: 38vw;
      height: 38vw;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.2;
      pointer-events: none;
      animation: floatBlob 14s ease-in-out infinite alternate;
    }

    body::before {
      left: -8vw;
      top: 12vh;
      background: linear-gradient(135deg, #1d9fff, #7f7bff);
    }

    body::after {
      right: -10vw;
      bottom: -8vh;
      background: linear-gradient(135deg, #00ffc2, #3a7bff);
      animation-duration: 18s;
    }

    @keyframes floatBlob {
      from { transform: translate3d(0, 0, 0) scale(1); }
      to { transform: translate3d(2vw, -3vh, 0) scale(1.08); }
    }

    .app {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 28px;
      position: relative;
      z-index: 1;
    }

    .card {
      width: min(920px, 100%);
      border: 1px solid var(--panel-border);
      background: linear-gradient(180deg, rgba(19, 34, 57, 0.80), rgba(10, 18, 33, 0.72));
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 30px;
      padding: 28px;
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 24px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, rgba(255,255,255,0.08), transparent 22%, transparent 70%, rgba(98,196,255,0.08));
      pointer-events: none;
    }

    .left, .right {
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.88;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 3vw, 42px);
      line-height: 1.06;
      font-weight: 750;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 26px;
      font-size: 14px;
      line-height: 1.7;
      max-width: 48ch;
    }

    .inputs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .field {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 14px 16px;
    }

    .field label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .field input {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 28px;
      font-weight: 700;
    }

    .presets {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 24px;
    }

    .chip, .btn {
      border: 1px solid rgba(255,255,255,0.09);
      color: var(--text);
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: transform .2s ease, border-color .2s ease, background .2s ease, box-shadow .2s ease, opacity .2s ease;
      cursor: pointer;
    }

    .chip {
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 13px;
    }

    .chip:hover, .btn:hover {
      transform: translateY(-1px);
      border-color: rgba(98,196,255,0.35);
      box-shadow: 0 0 0 1px rgba(98,196,255,0.10), 0 10px 28px rgba(10, 80, 140, 0.18);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .btn {
      min-width: 120px;
      padding: 13px 18px;
      border-radius: 16px;
      font-size: 14px;
      font-weight: 650;
    }

    .btn.primary {
      background: linear-gradient(135deg, rgba(98,196,255,0.28), rgba(127,123,255,0.25));
      border-color: rgba(127,123,255,0.34);
      box-shadow: 0 12px 30px rgba(66, 92, 255, 0.18);
    }

    .btn.ghost {
      background: rgba(255,255,255,0.04);
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .panel {
      height: 100%;
      min-height: 460px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 28px;
      display: grid;
      place-items: center;
      padding: 18px;
      position: relative;
      overflow: hidden;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 12% 18%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(98,196,255,0.16), transparent 60%);
      filter: blur(8px);
      pointer-events: none;
    }

    .ring-wrap {
      position: relative;
      width: min(360px, 100%);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
    }

    .ring-wrap svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
      filter: var(--ring-glow);
    }

    .ring-track {
      fill: none;
      stroke: var(--ring-track);
      stroke-width: 10;
    }

    .ring-progress {
      fill: none;
      stroke: url(#grad);
      stroke-width: 10;
      stroke-linecap: round;
      stroke-dasharray: 879.65;
      stroke-dashoffset: 879.65;
      transition: stroke-dashoffset 0.35s linear;
    }

    .time-readout {
      position: absolute;
      display: grid;
      place-items: center;
      text-align: center;
      gap: 10px;
    }

    .time-readout .status {
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .time-readout .time {
      font-variant-numeric: tabular-nums;
      font-size: clamp(46px, 7vw, 72px);
      font-weight: 800;
      letter-spacing: 0.03em;
      text-shadow: 0 0 20px rgba(255,255,255,0.06);
    }

    .time-readout .hint {
      color: var(--muted);
      font-size: 13px;
    }

    .footer-note {
      margin-top: 20px;
      color: var(--muted);
      font-size: 12px;
    }

    .done .time {
      color: var(--success);
      text-shadow: 0 0 18px rgba(126,255,199,0.22);
    }

    .flash {
      animation: flash 0.8s ease-in-out 5;
    }

    @keyframes flash {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.45; }
    }

    @media (max-width: 860px) {
      .card {
        grid-template-columns: 1fr;
      }
      .panel {
        min-height: 360px;
      }
    }

    @media (max-width: 520px) {
      .app { padding: 16px; }
      .card { padding: 18px; border-radius: 24px; }
      .inputs { grid-template-columns: 1fr 1fr; }
      .btn { min-width: unset; flex: 1 1 calc(50% - 6px); }
      .field input { font-size: 24px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="card" aria-label="倒數計時器小工具">
      <div class="left">
        <div class="eyebrow">Neo Timer</div>
        <h1>深色科技感<br>倒數計時器</h1>
        <div class="subtitle">
          高質感玻璃擬態介面，支援快速設定、開始、暫停、重設，以及時間到提醒。
        </div>

        <div class="inputs">
          <div class="field">
            <label for="minutes">分鐘</label>
            <input id="minutes" type="number" min="0" max="999" value="5" inputmode="numeric" />
          </div>
          <div class="field">
            <label for="seconds">秒數</label>
            <input id="seconds" type="number" min="0" max="59" value="0" inputmode="numeric" />
          </div>
        </div>

        <div class="presets">
          <button class="chip" data-minutes="1">1 分鐘</button>
          <button class="chip" data-minutes="5">5 分鐘</button>
          <button class="chip" data-minutes="10">10 分鐘</button>
          <button class="chip" data-minutes="25">25 分鐘</button>
          <button class="chip" data-minutes="45">45 分鐘</button>
        </div>

        <div class="actions">
          <button id="startBtn" class="btn primary">開始</button>
          <button id="pauseBtn" class="btn ghost" disabled>暫停</button>
          <button id="resetBtn" class="btn ghost">重設</button>
        </div>

        <div class="footer-note">
          第一版已內建提醒音與進度環，下一步可以再加上全螢幕模式、鍵盤快捷鍵、番茄鐘模式或自訂主題。
        </div>
      </div>

      <div class="right">
        <div class="panel" id="panel">
          <div class="ring-wrap">
            <svg viewBox="0 0 320 320" aria-hidden="true">
              <defs>
                <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#62c4ff" />
                  <stop offset="100%" stop-color="#7f7bff" />
                </linearGradient>
              </defs>
              <circle class="ring-track" cx="160" cy="160" r="140"></circle>
              <circle class="ring-progress" id="progressRing" cx="160" cy="160" r="140"></circle>
            </svg>

            <div class="time-readout" id="readout">
              <div class="status" id="statusText">Ready</div>
              <div class="time" id="timeDisplay">05:00</div>
              <div class="hint" id="hintText">設定好時間後按下開始</div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const minutesInput = document.getElementById('minutes');
    const secondsInput = document.getElementById('seconds');
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const resetBtn = document.getElementById('resetBtn');
    const progressRing = document.getElementById('progressRing');
    const timeDisplay = document.getElementById('timeDisplay');
    const statusText = document.getElementById('statusText');
    const hintText = document.getElementById('hintText');
    const readout = document.getElementById('readout');
    const panel = document.getElementById('panel');
    const presetButtons = [...document.querySelectorAll('.chip')];

    const CIRCUMFERENCE = 2 * Math.PI * 140;
    progressRing.style.strokeDasharray = String(CIRCUMFERENCE);
    progressRing.style.strokeDashoffset = String(CIRCUMFERENCE);

    let totalSeconds = getInputSeconds();
    let remainingSeconds = totalSeconds;
    let timerId = null;
    let endTime = null;
    let audioCtx = null;

    function sanitizeInputs() {
      let mins = Math.max(0, Math.min(999, parseInt(minutesInput.value || '0', 10) || 0));
      let secs = Math.max(0, Math.min(59, parseInt(secondsInput.value || '0', 10) || 0));
      minutesInput.value = mins;
      secondsInput.value = secs;
    }

    function getInputSeconds() {
      sanitizeInputs();
      const mins = parseInt(minutesInput.value || '0', 10) || 0;
      const secs = parseInt(secondsInput.value || '0', 10) || 0;
      return mins * 60 + secs;
    }

    function formatTime(total) {
      const mins = Math.floor(total / 60);
      const secs = total % 60;
      return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
    }

    function updateRing() {
      if (totalSeconds <= 0) {
        progressRing.style.strokeDashoffset = String(CIRCUMFERENCE);
        return;
      }
      const progress = remainingSeconds / totalSeconds;
      const offset = CIRCUMFERENCE * (1 - progress);
      progressRing.style.strokeDashoffset = String(offset);
    }

    function updateDisplay() {
      timeDisplay.textContent = formatTime(remainingSeconds);
      updateRing();
    }

    function syncIdleState() {
      totalSeconds = getInputSeconds();
      remainingSeconds = totalSeconds;
      updateDisplay();
      statusText.textContent = 'Ready';
      hintText.textContent = totalSeconds > 0 ? '設定好時間後按下開始' : '請先輸入倒數時間';
      readout.classList.remove('done', 'flash');
      panel.classList.remove('flash');
      startBtn.disabled = totalSeconds <= 0;
      pauseBtn.disabled = true;
    }

    function setInputsDisabled(disabled) {
      minutesInput.disabled = disabled;
      secondsInput.disabled = disabled;
      presetButtons.forEach(btn => btn.disabled = disabled);
    }

    function startTimer() {
      if (timerId) return;
      if (remainingSeconds <= 0) {
        totalSeconds = getInputSeconds();
        remainingSeconds = totalSeconds;
      }
      if (remainingSeconds <= 0) return;

      statusText.textContent = 'Running';
      hintText.textContent = '倒數中';
      startBtn.disabled = true;
      pauseBtn.disabled = false;
      setInputsDisabled(true);
      readout.classList.remove('done', 'flash');
      panel.classList.remove('flash');

      endTime = Date.now() + remainingSeconds * 1000;
      timerId = setInterval(() => {
        remainingSeconds = Math.max(0, Math.round((endTime - Date.now()) / 1000));
        updateDisplay();
        if (remainingSeconds <= 0) finishTimer();
      }, 200);
    }

    function pauseTimer() {
      if (!timerId) return;
      clearInterval(timerId);
      timerId = null;
      statusText.textContent = 'Paused';
      hintText.textContent = '已暫停，可繼續倒數';
      startBtn.disabled = false;
      pauseBtn.disabled = true;
      setInputsDisabled(false);
      minutesInput.value = Math.floor(remainingSeconds / 60);
      secondsInput.value = remainingSeconds % 60;
    }

    function resetTimer() {
      clearInterval(timerId);
      timerId = null;
      setInputsDisabled(false);
      syncIdleState();
    }

    function finishTimer() {
      clearInterval(timerId);
      timerId = null;
      remainingSeconds = 0;
      updateDisplay();
      statusText.textContent = 'Time Up';
      hintText.textContent = '時間到了';
      startBtn.disabled = false;
      pauseBtn.disabled = true;
      setInputsDisabled(false);
      readout.classList.add('done', 'flash');
      panel.classList.add('flash');
      playAlarm();
    }

    function playAlarm() {
      try {
        audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
        const now = audioCtx.currentTime;
        for (let i = 0; i < 4; i++) {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(i % 2 === 0 ? 880 : 660, now + i * 0.28);
          gain.gain.setValueAtTime(0.0001, now + i * 0.28);
          gain.gain.exponentialRampToValueAtTime(0.12, now + i * 0.28 + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + i * 0.28 + 0.22);
          osc.connect(gain).connect(audioCtx.destination);
          osc.start(now + i * 0.28);
          osc.stop(now + i * 0.28 + 0.24);
        }
      } catch (err) {
        console.warn('無法播放提醒音', err);
      }
    }

    presetButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        minutesInput.value = btn.dataset.minutes;
        secondsInput.value = 0;
        syncIdleState();
      });
    });

    [minutesInput, secondsInput].forEach(el => {
      el.addEventListener('input', syncIdleState);
      el.addEventListener('change', syncIdleState);
    });

    startBtn.addEventListener('click', startTimer);
    pauseBtn.addEventListener('click', pauseTimer);
    resetBtn.addEventListener('click', resetTimer);

    document.addEventListener('visibilitychange', () => {
      if (document.hidden || !timerId) return;
      remainingSeconds = Math.max(0, Math.round((endTime - Date.now()) / 1000));
      updateDisplay();
      if (remainingSeconds <= 0) finishTimer();
    });

    syncIdleState();
  </script>
</body>
</html>

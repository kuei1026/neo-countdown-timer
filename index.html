<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neo Countdown Timer</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <button
    class="page-theme-toggle"
    id="themeToggle"
    type="button"
    aria-label="切換白天與夜晚模式"
    title="切換主題"
  >
    <span class="toggle-track">
      <span class="toggle-thumb"></span>
      <span class="toggle-icon sun" aria-hidden="true">☀</span>
      <span class="toggle-icon moon" aria-hidden="true">☾</span>
    </span>
  </button>

  <main class="app">
    <section class="card" aria-label="倒數計時器小工具">
      <div class="left">
        <div class="eyebrow">COUNTDOWN</div>
        <h1>倒數計時器</h1>

        <div class="inputs">
          <div class="field picker-field">
            <label for="minutesPicker">分鐘</label>
            <div
              class="picker"
              id="minutesPicker"
              data-type="minutes"
              role="spinbutton"
              aria-label="分鐘"
              aria-valuemin="0"
              aria-valuemax="999"
              aria-valuenow="25"
              tabindex="0"
            ></div>
          </div>

          <div class="field picker-field">
            <label for="secondsPicker">秒數</label>
            <div
              class="picker"
              id="secondsPicker"
              data-type="seconds"
              role="spinbutton"
              aria-label="秒數"
              aria-valuemin="0"
              aria-valuemax="59"
              aria-valuenow="0"
              tabindex="0"
            ></div>
          </div>
        </div>

        <div class="presets">
          <button class="chip" data-minutes="1" type="button">1 分鐘</button>
          <button class="chip" data-minutes="5" type="button">5 分鐘</button>
          <button class="chip" data-minutes="10" type="button">10 分鐘</button>
          <button class="chip" data-minutes="25" type="button">25 分鐘</button>
          <button class="chip" data-minutes="45" type="button">45 分鐘</button>
        </div>

        <div class="actions">
          <button id="startBtn" class="btn primary" type="button">開始</button>
          <button id="pauseBtn" class="btn ghost" type="button" disabled>暫停</button>
          <button id="resetBtn" class="btn ghost" type="button">重設</button>
        </div>
      </div>

      <div class="right">
        <div class="panel" id="panel">
          <div class="ring-wrap">
            <svg viewBox="0 0 320 320" aria-hidden="true">
              <defs>
                <linearGradient id="grad" x1="0%" y1="100%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="#59bbff" />
                  <stop offset="100%" stop-color="#7c79ff" />
                </linearGradient>
              </defs>

              <circle class="ring-track" cx="160" cy="160" r="140"></circle>
              <circle class="ring-progress" id="progressRing" cx="160" cy="160" r="140"></circle>
            </svg>

            <div class="time-readout" id="readout">
              <div class="status" id="statusText"></div>
              <div class="time" id="timeDisplay">10:00</div>
              <div class="hint" id="hintText"></div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="./js/app.js"></script>
</body>
</html>

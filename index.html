<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neo Countdown Timer</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>

<body>

  <!-- 🌗 全局主題切換 -->
  <div class="page-theme-toggle" id="themeToggle">
    <div class="toggle-track">
      <div class="toggle-thumb"></div>
      <div class="toggle-icon sun">☀</div>
      <div class="toggle-icon moon">☾</div>
    </div>
  </div>

  <main class="app">
    <section class="card">

      <div class="left">
        <div class="eyebrow">COUNTDOWN</div>
        <h1>倒數計時器</h1>

        <div class="inputs">

          <!-- 分鐘 -->
          <div class="field picker-field">
            <label>分鐘</label>
            <div class="picker" id="minutesPicker"></div>
          </div>

          <!-- 秒數 -->
          <div class="field picker-field">
            <label>秒數</label>
            <div class="picker" id="secondsPicker"></div>
          </div>

        </div>

        <div class="presets">
          <button class="chip" data-minutes="1">1 分鐘</button>
          <button class="chip" data-minutes="5">5 分鐘</button>
          <button class="chip" data-minutes="10">10 分鐘</button>
          <button class="chip" data-minutes="25">25 分鐘</button>
          <button class="chip" data-minutes="45">45 分鐘</button>
        </div>

        <div class="actions">
          <button id="startBtn" class="btn primary">開始</button>
          <button id="pauseBtn" class="btn ghost" disabled>暫停</button>
          <button id="resetBtn" class="btn ghost">重設</button>
        </div>

      </div>

      <!-- 右側 -->
      <div class="right">
        <div class="panel">
          <div class="ring-wrap">

            <svg viewBox="0 0 320 320">
              <defs>
                <linearGradient id="grad">
                  <stop offset="0%" stop-color="#62c4ff"/>
                  <stop offset="100%" stop-color="#7f7bff"/>
                </linearGradient>
              </defs>

              <circle cx="160" cy="160" r="140" class="ring-track"></circle>
              <circle cx="160" cy="160" r="140" id="progressRing" class="ring-progress"></circle>
            </svg>

            <div class="time-readout">
              <div id="timeDisplay">05:00</div>
            </div>

          </div>
        </div>
      </div>

    </section>
  </main>

  <script src="./js/app.js"></script>
</body>
</html>

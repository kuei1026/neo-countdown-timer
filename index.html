<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neo Countdown Timer</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <main class="app">
    <section class="card" aria-label="倒數計時器小工具">
      <div class="left">
        <div class="eyebrow">Countdown</div>
        <h1>倒數計時器</h1>

        <div class="inputs">
          <div class="field">
            <label for="minutes">分鐘</label>
            <input id="minutes" type="number" min="0" max="999" value="10" inputmode="numeric" />
          </div>
          <div class="field">
            <label for="seconds">秒數</label>
            <input id="seconds" type="number" min="0" max="59" value="0" inputmode="numeric" />
          </div>
        </div>

        <div class="presets">
          <button class="chip" data-minutes="1">1 分鐘</button>
          <button class="chip" data-minutes="5">5 分鐘</button>
          <button class="chip" data-minutes="10">10 分鐘</button>
          <button class="chip" data-minutes="25">25 分鐘</button>
          <button class="chip" data-minutes="45">45 分鐘</button>
        </div>

        <div class="actions">
          <button id="startBtn" class="btn primary">開始</button>
          <button id="pauseBtn" class="btn ghost" disabled>暫停</button>
          <button id="resetBtn" class="btn ghost">重設</button>
        </div>

      </div>

      <div class="right">
        <div class="panel" id="panel">
          <div class="ring-wrap">
            <svg viewBox="0 0 320 320" aria-hidden="true">
              <defs>
                <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#62c4ff" />
                  <stop offset="100%" stop-color="#7f7bff" />
                </linearGradient>
              </defs>
              <circle class="ring-track" cx="160" cy="160" r="140"></circle>
              <circle class="ring-progress" id="progressRing" cx="160" cy="160" r="140"></circle>
            </svg>

            <div class="time-readout" id="readout">
              <div class="status" id="statusText"></div>
              <div class="time" id="timeDisplay">05:00</div>
              <div class="hint" id="hintText"></div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="./js/app.js"></script>
</body>
</html>
